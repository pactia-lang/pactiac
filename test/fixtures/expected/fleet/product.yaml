product:
  name: FleetManagement
  description: Platform for tracking vehicles and managing fleets
  stackId: "@pactia/rust-anb"
  topology:
    mode: MICROSERVICES
  tenancy:
    mode: SINGLE_TENANT
  guide:
    - "All services follow clean architecture: api → application → domain → infrastructure"
    - Handlers must map errors to the platform error envelope before returning
    - Never log JWT tokens, secrets, or fields marked @pii
    - Every list endpoint uses cursor pagination — not offset
  surfaces:
    - id: vehicle_list
      platform: web
      screen:
        id: vehicle_list
        route:
          path: /fleet/vehicles
      bind:
        service: FleetService
        endpoint: list_vehicles
      description: Customer browses their vehicles in a paginated table
    - id: vehicle_list
      platform: ios
      screen:
        id: vehicle_list
        nav:
          tab: FleetTab
      bind:
        service: FleetService
        endpoint: list_vehicles
      description: Customer scrolls fleet on phone with pull-to-refresh
    - id: vehicle_detail
      platform: web
      screen:
        id: vehicle_detail
        route:
          path: /fleet/vehicles/:id
      bind:
        service: FleetService
        endpoint: get_vehicle
      description: Customer opens vehicle detail with latest GPS position
    - id: vehicle_create
      platform: web
      screen:
        id: vehicle_create
      bind:
        service: FleetService
        endpoint: create_vehicle
      description: Admin registers a vehicle from the fleet console
  security:
    statements:
      - id: fleet
        module: fleet
        text: All admin mutations must be audit-logged
    policies:
      - id: fleet_retention
        module: fleet
        retain:
          entity: GpsPosition
          period: forever
          reason: position history audit rule
        residency: EU
  deployment:
    id: fleet
    environments:
      - id: staging
        replicas: 2
        region: eu-west-1
      - id: production
        replicas: 3
        region: eu-west-1
    gates:
      - id: production
        scenarios: pass
        coverage: ">= 80%"
