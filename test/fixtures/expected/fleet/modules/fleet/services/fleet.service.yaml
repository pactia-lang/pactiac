service:
  name: FleetService
  description: Core fleet management and vehicle tracking
  flags:
    database: false
    cache: false
    events: false
  guide: Return errors via platform error envelope only — never raw stack traces to clients
  endpoints:
    - id: list_vehicles
      method: GET
      path: /api/v1/vehicles
      authorization:
        type: OWNERSHIP
        roles:
          - Customer
          - Admin
        ownership:
          scope: OWN_ROWS
      response:
        bodyRef: VehicleListResponse
      errors:
        - Forbidden
      modifiers:
        macros:
          - list
          - paginated
          - owner
      emits: []
      provenance: Pactia
    - id: get_vehicle
      method: GET
      path: /api/v1/vehicles/:id
      summary: Customer opens vehicle detail with latest GPS position
      authorization:
        type: OWNERSHIP
        roles:
          - Customer
          - Admin
        ownership:
          scope: OWN_ROWS
      response:
        bodyRef: VehicleDetailResponse
      errors:
        - NotFound
        - Forbidden
      modifiers:
        macros:
          - detail
          - owner
      emits: []
      provenance: Pactia
    - id: create_vehicle
      method: POST
      path: /api/v1/vehicles
      summary: Admin registers a vehicle from the fleet console
      authorization:
        type: ROLE
        roles:
          - Admin
      request:
        bodyRef: CreateVehicleRequest
      response:
        bodyRef: CreateVehicleResponse
        status: 201
      errors:
        - ValidationFailed
        - Conflict
      modifiers:
        macros:
          - create
          - idempotent
      emits:
        - vehicle.created
      provenance: Pactia
    - id: gps_ingest
      method: POST
      path: /api/v1/gps/ingest
      summary: Telematics device posts coordinates — no user UI
      authorization:
        type: PUBLIC
        roles: []
      request:
        bodyRef: GpsIngestRequest
      response:
        bodyRef: GpsIngestResponse
        status: 201
      errors:
        - ValidationFailed
        - DeviceUnknown
      modifiers:
        macros:
          - create
          - idempotent
      emits:
        - position.received
      provenance: Pactia
  scenarios:
    - name: Admin registers a vehicle
      service: FleetService
      provenance: Pactia
      given:
        actor: Admin
        auth: logged_in
      when:
        method: POST
        path: /api/v1/vehicles
        body:
          valid: true
      then:
        httpStatus: "201"
        kafkaEmits: vehicle.created
    - name: Customer cannot register vehicles
      service: FleetService
      provenance: Pactia
      given:
        actor: Customer
        auth: logged_in
      when:
        method: POST
        path: /api/v1/vehicles
      then:
        httpStatus: "403"
    - name: Customer views their own vehicles
      service: FleetService
      provenance: Pactia
      given:
        actor: Customer
        auth: logged_in
        ownership: owner
      when:
        method: GET
        path: /api/v1/vehicles
      then:
        httpStatus: "200"
        bodyRef: VehicleListResponse
  obligations: []
