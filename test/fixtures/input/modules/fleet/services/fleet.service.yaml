service:
  name: FleetService
  description: Core fleet management and vehicle tracking
  flags:
    database: true
    cache: true
    events: true
  endpoints:
    - id: list-vehicles
      method: GET
      path: /api/v1/vehicles
      summary: List vehicles
      authorization:
        type: OWNERSHIP
        roles:
          - Customer
          - Admin
      errors:
        - UNAUTHORIZED
        - FORBIDDEN
      emits: []
  scenarios:
    - name: Customer lists owned vehicles
      service: FleetService
      provenance: Pactia
      given:
        actor: Customer
        auth: logged_in
        ownership: owner
      when:
        method: GET
        path: /api/v1/vehicles
      then:
        httpStatus: "200"
        bodyRef: VehicleListResponse
  obligations: []
