name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

  compile-fixtures:
    name: compile fixtures
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build compiler
        run: npm run build

      - name: Compile relay workspace
        env:
          PACTIA_VENDOR_ROOT: test/fixtures/packages
        run: node dist/cli.js compile -w test/fixtures/workspace/relay -o /tmp/relay-out

      - name: Compile website workspace
        env:
          PACTIA_VENDOR_ROOT: test/fixtures/packages
        run: node dist/cli.js compile -w test/fixtures/workspace/website -o /tmp/website-out

      - name: Compile relay monolith
        env:
          PACTIA_VENDOR_ROOT: test/fixtures/packages
        run: node dist/cli.js compile -i test/fixtures/kernel/relay.pactia -o /tmp/relay-mono-out

  binary-smoke:
    name: native binary smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build linux x64 binary
        run: bun run build:bin:linux-x64

      - name: Smoke test binary
        env:
          PACTIA_VENDOR_ROOT: test/fixtures/packages
        run: bash scripts/smoke-binary.sh dist/pactiac-linux-x64
