name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build native binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all platform binaries
        run: bun run build:bin

      - name: Smoke test linux x64 binary
        env:
          PACTIA_VENDOR_ROOT: test/fixtures/packages
        run: bash scripts/smoke-binary.sh dist/pactiac-linux-x64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pactiac-linux-x64
            dist/pactiac-linux-arm64
            dist/pactiac-darwin-arm64
            dist/pactiac-darwin-x64
            dist/pactiac-windows-x64.exe
